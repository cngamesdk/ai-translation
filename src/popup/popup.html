<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>AI Translation</h1>

    <div class="form-group">
      <label for="apiUrl">API 地址</label>
      <input type="url" id="apiUrl" placeholder="https://api.openai.com">
    </div>

    <div class="form-group">
      <label for="apiFormat">API 格式</label>
      <select id="apiFormat">
        <option value="openai">OpenAI 兼容（ChatGPT、DeepSeek、Ollama 等）</option>
        <option value="anthropic">Anthropic（Claude）</option>
      </select>
    </div>

    <div class="form-group">
      <label for="apiKey">API 密钥</label>
      <div class="input-row">
        <input type="password" id="apiKey" placeholder="sk-...">
        <button id="toggleKey" class="btn-icon" title="显示/隐藏">👁</button>
      </div>
    </div>

    <div class="form-group">
      <label for="model">模型名称</label>
      <input type="text" id="model" placeholder="gpt-4o-mini / claude-sonnet-4-6">
    </div>

    <div class="form-group">
      <label for="targetLang">目标语言</label>
      <select id="targetLang">
        <option value="">自动检测（浏览器语言）</option>
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
        <option value="ru">Русский</option>
      </select>
    </div>

    <button id="saveBtn" class="btn-primary">保存设置</button>

    <hr>

    <button id="translatePageBtn" class="btn-action">翻译整个页面</button>
    <button id="clearBtn" class="btn-clear">清除所有译文</button>

    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
